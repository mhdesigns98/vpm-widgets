<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VPM Banner — Preview</title>
  <style>
    body { margin: 0; background: #f0f2f4; font-family: system-ui, sans-serif; padding: 2rem 0; }
    .preview-label {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 1rem;
    }

    /* Banner wrapper */
    .vpm-banner {
      background-color: #0c234b;
      color: white;
      padding: 1rem;
      font-family: system-ui, sans-serif;
      position: relative;
      z-index: 40;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);

      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 96px;
    }

    .vpm-banner-content {
      text-align: center;
      max-width: 960px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .vpm-banner-content p {
      margin: 0;
      font-size: 1rem;
      line-height: 1.6;
    }

    .vpm-button {
      display: inline-block;
      background-color: #fcd34d;
      color: #0c234b;
      font-weight: bold;
      text-decoration: none;
      padding: 0.5rem 1.25rem;
      font-size: 1rem;
      border-radius: 0.375rem;
      transition: background-color 0.2s ease, color 0.2s ease;
    }
    .vpm-button:hover { background-color: #fde68a; color: #000; }

    .vpm-close {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.5rem;
      font-weight: bold;
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s ease;
    }
    .vpm-close:hover { color: #fde68a; }

    @media (min-width: 640px) {
      .vpm-banner-content {
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>

<p class="preview-label">VPM Banner — dismisses for 3 days via localStorage</p>

<div id="vpm-banner" class="vpm-banner">
  <button id="vpm-banner-close" class="vpm-close" aria-label="Close banner">×</button>
  <div class="vpm-banner-content">
    <p>
      <strong>Federal funding was revoked.</strong> Your support keeps VPM strong.
    </p>
    <a
      href="https://www.pledgecart.org/?campaign=5D84E787-B482-4661-A488-C988BEEB0773"
      class="vpm-button"
      target="_blank"
      rel="noopener noreferrer"
    >
      Donate now
    </a>
  </div>
</div>

<script>
(function () {
  var banner = document.getElementById("vpm-banner");
  var closeBtn = document.getElementById("vpm-banner-close");
  var bannerKey = "vpmBannerDismissed";
  var hideDurationDays = 3;

  if (!banner || !closeBtn) return;

  var dismissedAt = localStorage.getItem(bannerKey);
  if (dismissedAt) {
    var now = new Date().getTime();
    var expiry = parseInt(dismissedAt) + hideDurationDays * 24 * 60 * 60 * 1000;
    if (now < expiry) {
      banner.style.display = "none";
    }
  }

  closeBtn.addEventListener("click", function () {
    banner.style.display = "none";
    localStorage.setItem(bannerKey, new Date().getTime());
  });
})();
</script>

</body>
</html>
